# FR-13: Alembic migration Job — runs before gateway rollout.
# This is a one-shot Job. In production, chain it with a Helm hook
# or ArgoCD sync hook so it runs on every deploy.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: event-ticketing
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/part-of: event-ticketing
    app.kubernetes.io/component: migration
  annotations:
    # Helm/ArgoCD: run this before the gateway deployment rolls out
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/part-of: event-ticketing
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: event-ticketing:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: event-ticketing-secrets
