# Phase 6.1: CI Pipeline — lint, type-check, test, container scan.
# Blocks PR merges on failure.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check core/ services/

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .[dev]
      - run: mypy core/ services/ --ignore-missing-imports

  test:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: event_ticketing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/event_ticketing
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .[dev]
      - run: pytest tests/ -v --tb=long --junitxml=test-results.xml
      - name: Print test failures
        if: failure()
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('test-results.xml')
          for tc in tree.iter('testcase'):
              for f in tc.findall('failure'):
                  print(f'FAILED: {tc.get(\"classname\")}.{tc.get(\"name\")}')
                  print(f.text[:3000] if f.text else '')
              for e in tc.findall('error'):
                  print(f'ERROR: {tc.get(\"classname\")}.{tc.get(\"name\")}')
                  print(e.text[:3000] if e.text else '')
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  build:
    name: Container Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t event-ticketing:ci-${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: event-ticketing:ci-${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
