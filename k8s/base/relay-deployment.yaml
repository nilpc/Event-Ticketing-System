# Outbox Relay Deployment — polls outbox_events every 5s with FOR UPDATE SKIP LOCKED.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: event-ticketing
  labels:
    app.kubernetes.io/name: relay
    app.kubernetes.io/part-of: event-ticketing
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relay
        app.kubernetes.io/part-of: event-ticketing
        app.kubernetes.io/component: worker
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: relay
                topologyKey: kubernetes.io/hostname

      containers:
        - name: relay
          image: event-ticketing:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "services.workers", "relay"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f 'services.workers relay' || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          envFrom:
            - secretRef:
                name: event-ticketing-secrets
