# NFR-7: Zero-trust NetworkPolicy — API gateway accepts external traffic.
# Phase 4.3: Scaffolded now; enforced in Phase 5+ when K8s cluster is provisioned.
#
# Apply after cluster setup:
#   kubectl apply -f k8s/network-policy-gateway.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-external-access
  namespace: event-ticketing
  labels:
    app.kubernetes.io/part-of: event-ticketing
    phase: "4"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
  policyTypes:
    - Ingress
  ingress:
    # Allow external traffic (from ingress controller / load balancer).
    - ports:
        - protocol: TCP
          port: 8000
