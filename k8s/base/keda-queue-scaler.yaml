# Phase 5.4, NFR-2: KEDA ScaledObject — scale admitter on Redis queue depth.
# Monitors all queue:* sorted sets in Redis.
#
# NOTE: KEDA's built-in Redis scaler only supports lists and streams,
# not sorted sets. Queue data is stored as ZSET (for priority ordering).
# To enable auto-scaling, either:
#   1. Export queue depth as a Prometheus metric from the admitter and use
#      the prometheus trigger, or
#   2. Add a lightweight sidecar that polls ZCARD and writes to a Redis
#      list consumable by this scaler.
# Below uses a cron-based fallback: scale to 0 during off-peak hours,
# maintain min 1 replica otherwise. Replace with a proper metrics trigger
# once observability stack is in place.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-scaler
  namespace: event-ticketing
  labels:
    app.kubernetes.io/name: admitter
    app.kubernetes.io/part-of: event-ticketing
spec:
  scaleTargetRef:
    name: admitter
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 8 * * *"
        end: "0 2 * * *"
        desiredReplicas: "1"
